<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Моє обране</title>

</head>
<body>

<h1>❤️ Моє обране</h1>

<div class="movies-grid">

    </div>
{% endfor %}
</div>

</body>
</html>
